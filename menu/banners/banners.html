<!-- Banner Idioma -->
<div id="idioma-banner" class="banner idioma-banner">
  <div class="banner-content idioma-content">
    <h2 class="idioma-titulo">Selecciona tu idioma</h2>
    <div class="idioma-opciones">
      <button id="idioma-es" class="idioma-btn">
        <img id="flag-es" class="idioma-flag">
        Español
      </button>
      <button id="idioma-en" class="idioma-btn">
        <img id="flag-en" class="idioma-flag">
        English
      </button>
    </div>
    <button id="cerrar-idioma" class="btn-idioma-cerrar">Cerrar</button>
  </div>
</div>


<!-- Banner Contacto -->
<div id="contacto-banner" class="banner">
  <div class="banner-content">
    <h2>Contacto</h2>
    <a id="btn-whatsapp" class="contacto-btn">WhatsApp</a>
    <a id="btn-facebook" class="contacto-btn">Facebook</a>
    <a id="btn-instagram" class="contacto-btn">Instagram</a>
    <button id="cerrar-contacto" class="btn-cerrar">Cerrar</button>
  </div>
</div>


<!-- Banner Wi-Fi -->
<div id="wifi-banner" class="banner banner-qr">
  <div class="banner-content">
    <h2>Wi-Fi</h2>
    <img id="wifi-qr" alt="QR Wi-Fi" class="qr-img">
    <button id="cerrar-wifi" class="btn-cerrar">Cerrar</button>
  </div>
</div>


<!-- Banner Compartir Página -->
<div id="share-banner" class="banner banner-qr">
  <div class="banner-content">
    <h2>Compartir página</h2>
    <img id="share-qr" alt="QR Compartir página" class="qr-img">
    <button id="cerrar-share" class="btn-cerrar">Cerrar</button>
  </div>
</div>
