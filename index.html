<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>Ofertas - La Logia</title>
  <link rel="icon" href="media/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/index/index.css">
  <link rel="stylesheet" href="css/menu/menu.css">
  <link rel="stylesheet" href="css/menu/banner.css">
  <style>
  html, body {
    background-color: #000000;
    color: #000000;
    margin: 0;
    padding: 0;
  }
  </style>
</head>
<body>
  <!-- Encabezado principal-->   
  <header>
    <div class="header-info">
      <h1>Carta</h1>
    </div>
    <div class="header-opcion">
      <button id="btn-opciones" class="btn-opciones">☰</button>
    </div>
  </header>

  <!-- Overlay para efecto de transparencia -->
  <div id="overlay" class="overlay"></div>

  <!-- Contenedor donde se cargará el menú modular -->
  <div id="menu-container"></div>


  <!-- Contenedor con scroll para menú -->
  <div class="menu">
    <div class="menu-inner" id="menu"></div>
  </div>

  <!-- Contenedor con scroll para imágenes -->
  <div class="imagenes-scroll">
    <div class="imagenes-carta">
      <img src="media/barra/ver_carta_completa/discotecalalogia.com.1.avif" 
           alt="Imagen 1" 
           class="imagen-normal" />

      <!-- Contenedor con scroll para zoom -->
      <div class="zoom-container">
        <img src="media/barra/ver_carta_completa/discotecalalogia.com.2.avif" 
             alt="Imagen 2 - Zoom" 
             class="imagen-zoom" />
      </div>
    </div>
  </div>

  <footer class="footer-fijo">
    <a href="barra/categorias/" class="btn-regresar">categorías</a>
    <a href="barra/hookah/" class="btn-regresar">hookah</a>
  </footer>


  <!-- Contenedor para el banner de Términos y Condiciones -->
  <div id="tyc-container"></div>

  <!-- Scripts externos para modularidad -->
  <script src="index/js/banner_tyc.js"></script>
  <script src="data/links.js"></script>
  <script>var basePath = "";</script>

  <!-- Scripts externos para Menu Desplegable -->
  <script src="menu/menu_loader.js"></script>
  <script src="menu/modules_menu.js"></script>
  <script src="menu/banners/banners_loader.js"></script>
  
</body>
</html>
